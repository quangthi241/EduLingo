- slug: atoms-and-coffee
  kind: listening
  title: Atoms and Coffee
  cefr: A2
  minutes: 3
  topic: science
  audio: null  # draft — awaiting recording
  body:
    transcript: >
      Welcome to the Morning Science minute. Did you know the caffeine in your
      coffee is a molecule that plants make to poison insects? Lucky for us,
      humans are too big to mind. Instead, it wakes us up by blocking
      sleep-signal receptors in the brain.
    mcq:
      - question: Why do plants make caffeine?
        choices: [To smell nice, To poison insects, To attract bees]
        correct_index: 1
      - question: What does caffeine block in humans?
        choices: [Pain receptors, Sleep-signal receptors, Memory receptors]
        correct_index: 1
      - question: Why doesn't caffeine poison humans?
        choices: [We are too big, We have antibodies, We filter it out through sweat]
        correct_index: 0
    short_answer:
      prompt: What does caffeine do in the brain?
      grading_notes: Blocks sleep-signal receptors / keeps us awake.

