# === READING (3) ===
- slug: coastlines
  kind: reading
  title: Coastlines
  cefr: B1
  minutes: 6
  topic: travel
  body:
    text: >
      The coastline of northern Portugal is sculpted by the Atlantic into long
      stretches of cliff and cove. Fishing villages cling to narrow inlets, where
      painted boats rest at dawn. Inland, pine forests filter the sea wind and
      scent the air with resin. Visitors who hike the cliff paths often describe
      the hush that falls at dusk, broken only by gulls and distant waves. The
      light shifts hourly, turning the granite from grey to copper.
    mcq:
      - question: What shapes the coastline?
        choices: [Ocean, Rivers, Glaciers]
        correct_index: 0
        rationale: "Opening sentence: sculpted by the Atlantic."
      - question: What scents the air inland?
        choices: [Salt, Pine resin, Woodsmoke]
        correct_index: 1
        rationale: "pine forests ... scent the air with resin"
      - question: What breaks the silence at dusk?
        choices: [Thunder, Gulls and waves, Church bells]
        correct_index: 1
        rationale: "broken only by gulls and distant waves"
    short_answer:
      prompt: Describe the colours of the cliffs in your own words.
      grading_notes: Look for "grey", "copper", or equivalent colour vocabulary.

- slug: kitchen-rituals
  kind: reading
  title: Kitchen Rituals
  cefr: A2
  minutes: 4
  topic: daily-life
  body:
    text: >
      Every Sunday evening, my grandmother prepares bread for the week. She wakes
      early, measures flour by hand, and kneads the dough on a wooden board. The
      kitchen fills with the warm smell of yeast. By the time the loaves come
      out of the oven, the whole house is awake. We eat the first slices with
      butter and quince jam while the radio plays quietly in the corner.
    mcq:
      - question: When does the grandmother bake?
        choices: [Monday morning, Sunday evening, Every day]
        correct_index: 1
      - question: What does the narrator eat with the bread?
        choices: [Butter and jam, Honey, Olive oil]
        correct_index: 0
      - question: What plays in the background?
        choices: [Television, Radio, Music from a phone]
        correct_index: 1
    short_answer:
      prompt: What time do the loaves come out of the oven?
      grading_notes: Accept "morning" or "by the time the house is awake".

- slug: cold-light
  kind: reading
  title: Cold Light
  cefr: B2
  minutes: 8
  topic: science
  body:
    text: >
      Bioluminescence — the production of light by living organisms — occurs
      widely in the deep ocean. Unlike incandescent sources, bioluminescent
      reactions release almost no heat, which is why biologists call this "cold
      light". Most marine species that glow use a two-molecule system: luciferin,
      which emits the photon, and luciferase, which catalyses the reaction. The
      colour of the light — typically blue-green — matches the wavelengths that
      travel furthest through seawater, suggesting a strong adaptive pressure.
    mcq:
      - question: Why is bioluminescence called "cold light"?
        choices:
          - It only works in cold water
          - It produces almost no heat
          - It is visible from far away
        correct_index: 1
      - question: Which molecule emits the photon?
        choices: [Luciferase, Luciferin, Chlorophyll]
        correct_index: 1
      - question: Why is blue-green common?
        choices:
          - It is the only colour luciferin can produce
          - It travels furthest through seawater
          - It matches surface sunlight
        correct_index: 1
    short_answer:
      prompt: What role does luciferase play in bioluminescence?
      grading_notes: Accept any answer mentioning "catalyst" / "catalyses the reaction".

