# === WRITING (3) ===
- slug: email-apology
  kind: writing
  title: Email Apology
  cefr: B1
  minutes: 10
  topic: business
  body:
    prompt: Write a 120-150 word email apologising to a client for a delayed order. Offer a concrete remedy.
    exemplar: >
      Dear Mr Silva, I am writing to apologise for the delay of your recent
      order, which should have arrived yesterday. A shipping error at our
      warehouse has pushed delivery back by three days. To make up for the
      inconvenience, I have upgraded the remaining items to express shipping
      at no cost and included a twenty-percent voucher for your next order. I
      will personally track the shipment and confirm delivery as soon as it
      reaches you. Thank you for your patience. Kind regards, Mariana.

